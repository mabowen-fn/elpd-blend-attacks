# =============================================================================
# Adaptive ELPD-Blend Attack — Master Configuration
# =============================================================================

# ── Experiment Identity ────────────────────────────────────────────────────
experiment:
  name: "elpd_blend_attack_v1"
  seed: 42
  device: "mps"                      # "mps" (Apple Silicon) | "cuda" | "cpu"
  log_dir: "results/logs"
  checkpoint_dir: "results/checkpoints"
  plot_dir: "results/plots"

# ── Weights & Biases ──────────────────────────────────────────────────────
wandb:
  enabled: true
  project: "elpd-blend-attack"
  entity: null                       # set to your W&B username / team
  tags: ["elpd", "black-box", "hybrid"]
  log_eta_every_step: true           # log η per attack step (key diagnostic)

# ── Dataset ───────────────────────────────────────────────────────────────
dataset:
  name: "cifar10"                    # "cifar10" (local dev) | "imagenet" (AutoDL)
  root: "data"                       # local: adversarial_ml/data/
  num_samples: 100                   # 100 for local dev; 1000 for full AutoDL run
  batch_size: 50
  num_workers: 0                     # 0 for MPS compatibility (no forked workers)
  # ImageNet normalization (also used for CIFAR-10 with pretrained models)
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
  image_size: 224

# ── Models ────────────────────────────────────────────────────────────────
models:
  # The black-box target — treated as unknown; only queries allowed
  target:
    arch: "resnet50"                 # torchvision model key
    pretrained: true
    source: "torchvision"           # "torchvision" | "timm" | "local"
    weights_path: null              # only used when source == "local"

  # The white-box surrogate — gradients are free but biased
  surrogate:
    arch: "vgg16_bn"
    pretrained: true
    source: "torchvision"
    weights_path: null

# ── Attack Constraints (L∞ threat model) ─────────────────────────────────
attack:
  epsilon: 0.05                      # L∞ budget  (≈ 12.75/255 for [0,1] space)
  step_size: 0.005                   # α per iteration
  num_steps: 100                     # T — total attack iterations
  targeted: false                    # false → untargeted (maximise loss)
  clip_min: 0.0
  clip_max: 1.0
  query_budget: 5000                 # hard cap on target queries per image
  early_stop: true                   # stop once prediction flips

# ── Query-Based Gradient Estimator (Finite Differences / NES) ────────────
query_estimator:
  method: "nes"                      # "nes" | "spsa" | "fd_central"
  # NES / SPSA shared
  n_samples: 10                      # q — antithetic pairs (10 local, 20 AutoDL)
  sigma: 0.001                       # σ — smoothing / finite-difference radius
  # SPSA-only (ignored for nes/fd_central)
  spsa_c: 0.001
  spsa_a: 0.01
  # Variance-reduction: Rao-Blackwell baseline subtraction
  rao_blackwell: true

# ── ELPD Blender (Core Bayesian Module) ──────────────────────────────────
elpd_blender:
  method: "waic"                     # "waic" | "loo_psis" | "cosine_var"
  eta_grid:
    low: 0.0
    high: 1.0
    n_points: 21                     # grid resolution; 21 → {0.0, 0.05, …, 1.0}
  # WAIC-specific
  waic:
    # Each NES sample is treated as a "posterior draw" of the gradient.
    # The variance of log-likelihood across draws is the WAIC penalty (p_WAIC).
    # See elpd_blender.py for the derivation of this approximation.
    llik_temperature: 1.0            # T_L — scales the Gaussian log-likelihood
    min_samples_for_waic: 4          # need ≥ 4 draws to estimate variance reliably
  # LOO-PSIS-specific
  loo_psis:
    pareto_k_threshold: 0.7          # k̂ > 0.7 → PSIS unreliable, fall back to WAIC
  # Cosine-variance fallback (fast, low-sample)
  cosine_var:
    var_weight: 0.5                  # trade-off between alignment and certainty
  # η smoothing: EMA over steps to prevent erratic blending
  eta_ema_alpha: 0.3                 # α_ema; lower → smoother η trajectory
  eta_min: 0.0                       # hard floor
  eta_max: 1.0                       # hard ceiling

# ── Momentum (MI-FGSM style) ──────────────────────────────────────────────
momentum:
  enabled: true
  mu: 1.0                            # decay factor for gradient history

# ── Baselines (run alongside the main attack for fair comparison) ─────────
baselines:
  run_mifgsm: true
  run_difgsm: true
  run_nes: true
  run_square: true
  run_static_hybrid:
    enabled: true
    eta_static: 0.5                  # fixed η for the static hybrid baseline

# ── Logging (CSV fallback when W&B is disabled) ───────────────────────────
csv_logging:
  enabled: true
  path: "results/logs/run_metrics.csv"
  flush_every_n_steps: 10
