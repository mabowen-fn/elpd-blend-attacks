# =============================================================================
# Adaptive ELPD-Blend Attack — AutoDL GPU Configuration
# =============================================================================

# ── Experiment Identity ────────────────────────────────────────────────────
experiment:
  name: "elpd_blend_imagenet_1000"
  seed: 42
  device: "cuda"
  log_dir: "results/logs"
  checkpoint_dir: "results/checkpoints"
  plot_dir: "results/plots"

# ── Weights & Biases ──────────────────────────────────────────────────────
wandb:
  enabled: true
  project: "elpd-blend-attack"
  entity: null                       # set to your W&B username if needed
  tags: ["elpd", "black-box", "hybrid", "imagenet", "gpu"]
  log_eta_every_step: true

# ── Dataset ───────────────────────────────────────────────────────────────
dataset:
  name: "imagenet"
  root: "data"                       # expects data/val/<class_name>/<image>.JPEG
  num_samples: 1000
  batch_size: 1
  num_workers: 4                     # GPU server has many CPU cores
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
  image_size: 224

# ── Models ────────────────────────────────────────────────────────────────
models:
  # Black-box target: ResNet-50 — widely used, strong, well-calibrated
  target:
    arch: "resnet50"
    pretrained: true
    source: "torchvision"
    weights_path: null

  # White-box surrogate: DenseNet-121 — different family from ResNet,
  # provides meaningful but imperfect gradient signal (realistic transfer gap)
  surrogate:
    arch: "densenet121"
    pretrained: true
    source: "torchvision"
    weights_path: null

# ── Attack Constraints (L∞ threat model) ─────────────────────────────────
attack:
  epsilon: 0.05                      # 12.75/255 — standard ImageNet eval budget
  step_size: 0.005                   # α = ε/10
  num_steps: 100                     # T — sufficient for convergence at this ε
  targeted: false
  clip_min: 0.0
  clip_max: 1.0
  query_budget: 10000                # 10k queries — enough to differentiate methods
  early_stop: true

# ── Query-Based Gradient Estimator ────────────────────────────────────────
query_estimator:
  method: "nes"
  n_samples: 50                      # 50 antithetic pairs = 100 queries/step
  sigma: 0.001                       # smoothing radius
  spsa_c: 0.001
  spsa_a: 0.01
  rao_blackwell: true

# ── ELPD Blender ──────────────────────────────────────────────────────────
elpd_blender:
  method: "waic"
  eta_grid:
    low: 0.0
    high: 1.0
    n_points: 21
  waic:
    llik_temperature: 1.0
    min_samples_for_waic: 4
  loo_psis:
    pareto_k_threshold: 0.7
  cosine_var:
    var_weight: 0.5
  eta_ema_alpha: 0.6
  eta_min: 0.0
  eta_max: 1.0
  min_alignment: 0.05

# ── Momentum ──────────────────────────────────────────────────────────────
momentum:
  enabled: true
  mu: 1.0

# ── Baselines ─────────────────────────────────────────────────────────────
baselines:
  run_mifgsm: true
  run_difgsm: true
  run_nes: true
  run_square: true
  run_static_hybrid:
    enabled: true
    eta_static: 0.5

# ── Logging ───────────────────────────────────────────────────────────────
csv_logging:
  enabled: true
  path: "results/logs/run_metrics.csv"
  flush_every_n_steps: 5
